{% extends "base.html" %}

{% block title %}Create Event - SaskPolly{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 py-10 sm:px-6 lg:px-8">
  <h1 class="text-2xl font-bold text-white mb-8 flex items-center gap-2">
    <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    Create Event
  </h1>

  <form method="POST" action="/create" class="space-y-6">
    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2">Title</label>
      <input type="text" name="title" required
        class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white placeholder-zinc-500 focus:border-emerald-500 focus:outline-none"
        placeholder="e.g. Will Saskatoon Blades win the championship?">
    </div>
    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2">Description</label>
      <textarea name="description" required rows="4"
        class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white placeholder-zinc-500 focus:border-emerald-500 focus:outline-none"
        placeholder="Describe the event and resolution criteria..."></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2">Category</label>
      <select name="category"
        class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white focus:border-emerald-500 focus:outline-none">
        <option>Darts</option>
        <option>Hockey</option>
        <option>Football</option>
        <option>Baseball</option>
        <option>Politics</option>
        <option>Weather</option>
        <option>Other</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2">Closes At</label>
      <input type="datetime-local" name="closes_at"
        class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white focus:border-emerald-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-2">Vig %</label>
      <input type="number" name="vig_percent" step="0.1" value="2.5"
        class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white focus:border-emerald-500 focus:outline-none">
    </div>
    <button type="submit"
      class="w-full rounded-xl bg-emerald-500 py-3 text-sm font-semibold text-black hover:bg-emerald-400 transition">
      Create Market
    </button>
  </form>
</div>
{% endblock %}
