{% extends "base.html" %}

{% block title %}Sign Up - SaskPolly{% endblock %}

{% block content %}
<div class="mx-auto max-w-md px-4 py-16 sm:px-6 lg:px-8">
  <div class="rounded-2xl border border-zinc-800 bg-zinc-950 p-8">
    <h2 class="text-2xl font-bold text-white mb-6">Create Account</h2>
    <form method="POST" action="{{ url_for('register') }}" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Name</label>
        <input type="text" name="name" class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-2.5 text-white focus:border-emerald-500 focus:outline-none" placeholder="Your name">
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Email</label>
        <input type="email" name="email" required class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-2.5 text-white focus:border-emerald-500 focus:outline-none" placeholder="you@example.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Password</label>
        <input type="password" name="password" required class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-2.5 text-white focus:border-emerald-500 focus:outline-none" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full rounded-xl bg-emerald-500 py-2.5 text-sm font-semibold text-black hover:bg-emerald-400 transition">Create Account</button>
    </form>
    <div class="mt-4 text-center text-sm text-zinc-500">
      Already have an account? <a href="/login" class="text-emerald-400 hover:underline">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
